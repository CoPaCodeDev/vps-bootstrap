services:
  claude-service:
    build:
      context: .
      dockerfile: Dockerfile.claude-service
    container_name: ai-workspace-claude
    restart: unless-stopped
    ipc: host
    environment:
      GIT_USER: "{{GIT_USER}}"
      GIT_EMAIL: "{{GIT_EMAIL}}"
      DISABLE_AUTOUPDATER: "1"
      PLAYWRIGHT_BROWSERS_PATH: /home/claude/.cache/ms-playwright
      PROJECTS_DIR: /home/claude/projects
      VIDEOS_DIR: /shared/videos
    volumes:
      - projects:/home/claude/projects
      - claude-config:/home/claude/.claude
      - npm-cache:/home/claude/.npm
      - pw-browsers:/home/claude/.cache/ms-playwright
      - shared-videos:/shared/videos
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: ai-workspace-dashboard
    restart: unless-stopped
    volumes:
      - projects:/projects:ro
      - shared-videos:/shared/videos:ro
    ports:
      - "8080:80"

volumes:
  projects:
  claude-config:
  npm-cache:
  pw-browsers:
  shared-videos:
