services:
  code-server:
    build:
      context: .
      dockerfile: Dockerfile.code-server
    container_name: ai-workspace-code
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: "{{ANTHROPIC_API_KEY}}"
      GIT_USER: "{{GIT_USER}}"
      GIT_EMAIL: "{{GIT_EMAIL}}"
      SUDO_PASSWORD: "{{SUDO_PASSWORD}}"
    volumes:
      - projects:/home/coder/projects
      - claude-config:/home/coder/.claude
      - videos:/shared/videos
    ports:
      - "8443:8443"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8443/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    container_name: ai-workspace-playwright
    restart: unless-stopped
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - videos:/shared/videos
      - projects:/home/coder/projects:ro

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: ai-workspace-dashboard
    restart: unless-stopped
    volumes:
      - projects:/home/coder/projects:ro
    ports:
      - "8080:80"

volumes:
  projects:
  claude-config:
  videos:
