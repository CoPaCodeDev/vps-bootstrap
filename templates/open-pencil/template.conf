# OpenPencil - AI-nativer Vektor-Design-Editor
TEMPLATE_NAME="OpenPencil"
TEMPLATE_DESCRIPTION="Open-Source Design-Editor (Figma-Alternative) mit MCP-Server fuer AI-Platform-Zugriff"
TEMPLATE_DEPLOY_DIR="/opt/open-pencil"

# Voraussetzungen
TEMPLATE_REQUIRES_DOCKER=true
TEMPLATE_REQUIRES_ROUTE=true
TEMPLATE_ROUTE_PORT=3000

# Variablen: Name|Beschreibung|Default|Typ|Bedingung
TEMPLATE_VARS=(
    "DOMAIN|Domain (z.B. pencil.example.de)||required"
    "MCP_PORT|MCP-Server Port (nur lokal/CloudVLAN)|7600|default"
    "MCP_WS_PORT|MCP WebSocket Port|7601|default"
    "MCP_AUTH_TOKEN|MCP Auth-Token (leer = kein Token)||generate"
)

# Standardwerte fuer interne Variablen
TEMPLATE_DEFAULTS=(
    "PAPERLESS_REMOTE_USER=false"
)
