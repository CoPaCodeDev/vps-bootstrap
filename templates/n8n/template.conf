# n8n - Workflow-Automatisierung
TEMPLATE_NAME="n8n"
TEMPLATE_DESCRIPTION="Workflow-Automatisierungsplattform (Self-Hosted)"
TEMPLATE_DEPLOY_DIR="/opt/n8n"

# Voraussetzungen
TEMPLATE_REQUIRES_DOCKER=true
TEMPLATE_REQUIRES_ROUTE=true
TEMPLATE_ROUTE_PORT=5678

# Variablen: Name|Beschreibung|Default|Typ|Bedingung
TEMPLATE_VARS=(
    "DOMAIN|Domain (z.B. n8n.example.de)||required"
    "DB_PASSWORD|Datenbank-Passwort||generate"
    "N8N_ENCRYPTION_KEY|Verschlüsselungs-Key für Credentials||generate"
)
